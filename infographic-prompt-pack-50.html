Цвет и свет: подберите единую цветовую систему, соответствующую стилю "${name}". Контраст между фоном и текстом должен быть высоким. Важные элементы выделяйте цветом, размером или положением, но не перегружайте композицию.

Качество: итог должен выглядеть как готовая инфографика для лендинга, презентации, Telegram-поста, образовательного курса или печатного постера. Уровень исполнения - премиальная дизайн-студия, аккуратная верстка, чистая визуальная иерархия, продуманная композиция, единый дизайн-код.

Ограничения: без хаотичного набора иконок, без перегруза, без водяных знаков, без логотипов реальных брендов, если они не указаны отдельно, без случайных лиц, без лишнего мелкого текста, без визуального мусора. Формат: [укажите формат, например 3:4, 16:9, 1:1 или горизонтальный баннер].`;
}
function esc(x){return String(x).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function render(){
 const q=search.value.toLowerCase().trim();
 grid.innerHTML='';
 styles.forEach((s,i)=>{
  const [cat,name,subtitle,use,details]=s;
  const hay=(cat+' '+name+' '+subtitle+' '+use+' '+details).toLowerCase();
  if((active!=='Все стили'&&cat!==active)||(q&&!hay.includes(q))) return;
  const prompt=makePrompt(name,subtitle,use,details);
  const article=document.createElement('article'); article.className='card';
  article.innerHTML=`<div class="top"><span class="num">${String(i+1).padStart(2,'0')}</span><span>${esc(cat)}</span></div><h2>${esc(name)}</h2><div class="sub">${esc(subtitle)}</div><p class="meta"><b>Когда использовать:</b> ${esc(use)}</p><p class="meta"><b>Визуальный принцип:</b> ${esc(details)}</p><button class="copy">Скопировать промпт</button><pre>${esc(prompt)}</pre>`;
  article.querySelector('.copy').onclick=async()=>{try{await navigator.clipboard.writeText(prompt);article.querySelector('.copy').textContent='Скопировано';setTimeout(()=>article.querySelector('.copy').textContent='Скопировать промпт',1200)}catch(e){article.querySelector('.copy').textContent='Скопируйте вручную'}};
  grid.appendChild(article); requestAnimationFrame(()=>article.classList.add('show'));
 });
}
categories.forEach(c=>{const b=document.createElement('button');b.textContent=c;b.className=c===active?'active':'';b.onclick=()=>{active=c;document.querySelectorAll('.filters button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()};filters.appendChild(b)});
search.addEventListener('input', render); render();
addEventListener('scroll',()=>{const h=document.documentElement;document.getElementById('progress').style.width=((h.scrollTop)/(h.scrollHeight-h.clientHeight)*100)+'%'},{passive:true});
</script>
</body>
</html>
